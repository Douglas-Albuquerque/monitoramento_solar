<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Paradas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-grad {
            background-image: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            font-weight: bold;
            color: #fff;
            padding: 0.4rem 1.5rem;
            font-size: 0.95rem;
        }

        .btn-grad:hover {
            filter: brightness(1.1);
        }
    </style>
</head>

<body style="
  min-height: 100vh;
  margin: 0;
  padding: 0;
  background-image: radial-gradient(circle at center, #3F6FB5 0%, #1F3F6E 50%, #122440 100%);
  color: #f8f9fa;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
">
    <!-- TOASTS -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="toast align-items-center text-white 
                    {% if category == 'success' %}bg-success
                    {% elif category == 'danger' %}bg-danger
                    {% elif category == 'warning' %}bg-warning text-dark
                    {% else %}bg-secondary{% endif %}
                    border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>

    <!-- CARD LOGIN -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow-lg"
            style="min-width: 320px; max-width: 400px; background: rgba(0,0,0,0.7); border: none;">
            <div class="card-body">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo"
                    style="height: 100px; display: block; margin-left: auto; margin-right: auto;">
                <form method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label" style="color: azure;">Usuário</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label" style="color: azure;">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button type="submit" class="btn btn-grad">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JS Bootstrap + toasts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toastElList = [].slice.call(document.querySelectorAll('.toast'));
            toastElList.forEach(function (toastEl) {
                const t = new bootstrap.Toast(toastEl);
                t.show();
            });
        });
    </script>
</body>

</html>
